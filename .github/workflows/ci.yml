name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "manifest.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "biome.json"
      - "vitest.config.*"
      - "website/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "manifest.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "biome.json"
      - "vitest.config.*"
      - "website/**"
      - ".github/workflows/ci.yml"

jobs:
  lint:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint with Biome
        run: pnpm run lint

      - name: Run tests
        run: pnpm run test

      - name: Build extension
        run: pnpm run build

      - name: Lint Firefox manifest
        run: pnpm run lint:firefox

  website:
    name: Website Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-website-${{ runner.os }}-${{ hashFiles('website/pnpm-lock.yaml') }}
          restore-keys: pnpm-website-${{ runner.os }}-

      - name: Install dependencies
        working-directory: website
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Rebuild native deps
        working-directory: website
        run: pnpm rebuild esbuild sharp

      - name: Build website
        working-directory: website
        run: pnpm build
