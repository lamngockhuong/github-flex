name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "manifest.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "biome.json"
      - "vitest.config.*"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "manifest.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "biome.json"
      - "vitest.config.*"
      - ".github/workflows/ci.yml"

jobs:
  lint:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint with Biome
        run: pnpm run lint

      - name: Run tests
        run: pnpm run test
