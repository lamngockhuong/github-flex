      </g>
      <text x="40" y="17" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#a371f7">GitHub Flex</text>
    </g>

    <!-- Headline -->
    <text x="0" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#ffffff">
      Supercharge
    </text>
    <text x="0" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#a371f7">
      GitHub
    </text>

    <!-- Subheadline -->
    <text x="0" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b949e">
      Wide layout, lightbox, GIFs, and more
    </text>

    <!-- Features row -->
    <g transform="translate(0, 165)">
      <rect x="0" y="0" width="50" height="22" rx="11" fill="rgba(137,87,229,0.2)"/>
      <text x="25" y="15" font-family="system-ui, sans-serif" font-size="9" fill="#a371f7" text-anchor="middle">Wide</text>

      <rect x="58" y="0" width="60" height="22" rx="11" fill="rgba(137,87,229,0.2)"/>
      <text x="88" y="15" font-family="system-ui, sans-serif" font-size="9" fill="#a371f7" text-anchor="middle">Lightbox</text>

      <rect x="126" y="0" width="45" height="22" rx="11" fill="rgba(137,87,229,0.2)"/>
      <text x="148" y="15" font-family="system-ui, sans-serif" font-size="9" fill="#a371f7" text-anchor="middle">GIFs</text>
    </g>
  </g>

  <!-- Right side: PLACEHOLDER -->
  <g transform="translate(250, 20)">
    <rect x="0" y="0" width="170" height="240" rx="10" fill="rgba(22,27,34,0.8)" stroke="#8957e5" stroke-width="2" stroke-dasharray="8,4"/>

    <text x="85" y="110" font-family="system-ui, sans-serif" font-size="11" fill="#a371f7" text-anchor="middle">SCREENSHOT</text>
    <text x="85" y="130" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">170 x 240 px</text>

    <!-- Corner guides -->
    <path d="M 12 0 L 0 0 L 0 12" fill="none" stroke="#a371f7" stroke-width="1.5"/>
    <path d="M 158 0 L 170 0 L 170 12" fill="none" stroke="#a371f7" stroke-width="1.5"/>
    <path d="M 0 228 L 0 240 L 12 240" fill="none" stroke="#a371f7" stroke-width="1.5"/>
    <path d="M 170 228 L 170 240 L 158 240" fill="none" stroke="#a371f7" stroke-width="1.5"/>
  </g>
