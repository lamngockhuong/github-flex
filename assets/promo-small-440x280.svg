<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 280" width="440" height="280">
  <defs>
    <!-- GitHub Flex Purple gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="40%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#3d1f6d"/>
    </linearGradient>

    <!-- Subtle purple glow -->
    <radialGradient id="purpleGlow" cx="80%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8957e5;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#8957e5;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="440" height="280" fill="url(#bgGradient)"/>
  <rect width="440" height="280" fill="url(#purpleGlow)"/>

  <!-- Left side: Content -->
  <g transform="translate(24, 36)">
    <!-- Logo + Name -->
    <g>
      <!-- GitHub Flex Logo -->
      <g transform="translate(0, -6)">
        <rect width="32" height="32" rx="5" fill="#8957e5"/>
