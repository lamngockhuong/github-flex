.767-.062l-.027.004.368-.064q0 .609.008 1.418t.008.873v.014c0 .185-.08.351-.208.466-.119.089-.268.143-.431.143-.075 0-.147-.011-.214-.032l.005.001c-4.929-1.689-8.409-6.283-8.409-11.69 0-2.268.612-4.393 1.681-6.219l-.032.058c1.094-1.871 2.609-3.386 4.422-4.449l.058-.031c1.739-1.034 3.835-1.645 6.073-1.645h.098z"/>
        </g>
        <g stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
          <path d="M5 12 L5 5 L12 5"/>
          <path d="M32 5 L39 5 L39 12"/>
          <path d="M5 32 L5 39 L12 39"/>
          <path d="M39 32 L39 39 L32 39"/>
        </g>
      </g>
      <text x="54" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#a371f7">GitHub Flex</text>
    </g>

    <!-- Main headline -->
    <text x="0" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#ffffff">
      Supercharge
    </text>
    <text x="0" y="158" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#a371f7">
      GitHub
    </text>

    <!-- Subheadline -->
    <text x="0" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#8b949e">
      Wide layout, lightbox, GIFs, and more
    </text>

    <!-- Feature list -->
    <g transform="translate(0, 260)">
      <g transform="translate(0, 0)">
        <circle cx="10" cy="10" r="10" fill="rgba(137,87,229,0.2)"/>
        <text x="10" y="14" font-family="system-ui, sans-serif" font-size="10" fill="#a371f7" text-anchor="middle">&#x2713;</text>
        <text x="30" y="14" font-family="system-ui, sans-serif" font-size="14" fill="#e6edf3">Wide Layout mode</text>
      </g>

      <g transform="translate(0, 36)">
        <circle cx="10" cy="10" r="10" fill="rgba(137,87,229,0.2)"/>
        <text x="10" y="14" font-family="system-ui, sans-serif" font-size="10" fill="#a371f7" text-anchor="middle">&#x2713;</text>
        <text x="30" y="14" font-family="system-ui, sans-serif" font-size="14" fill="#e6edf3">Image Lightbox</text>
      </g>

      <g transform="translate(0, 72)">
        <circle cx="10" cy="10" r="10" fill="rgba(137,87,229,0.2)"/>
        <text x="10" y="14" font-family="system-ui, sans-serif" font-size="10" fill="#a371f7" text-anchor="middle">&#x2713;</text>
        <text x="30" y="14" font-family="system-ui, sans-serif" font-size="14" fill="#e6edf3">GIF Picker</text>
      </g>

      <g transform="translate(0, 108)">
        <circle cx="10" cy="10" r="10" fill="rgba(137,87,229,0.2)"/>
        <text x="10" y="14" font-family="system-ui, sans-serif" font-size="10" fill="#a371f7" text-anchor="middle">&#x2713;</text>
        <text x="30" y="14" font-family="system-ui, sans-serif" font-size="14" fill="#e6edf3">Sidebar Toggle</text>
      </g>
    </g>
  </g>

  <!-- Right side: PLACEHOLDER -->
  <g transform="translate(440, 40)">
    <rect x="0" y="0" width="440" height="600" rx="12" fill="rgba(22,27,34,0.8)" stroke="#8957e5" stroke-width="2" stroke-dasharray="10,5"/>

    <text x="220" y="280" font-family="system-ui, sans-serif" font-size="18" fill="#a371f7" text-anchor="middle">SCREENSHOT PLACEHOLDER</text>
    <text x="220" y="310" font-family="system-ui, sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">440 x 600 px</text>

    <!-- Corner guides -->
    <path d="M 16 0 L 0 0 L 0 16" fill="none" stroke="#a371f7" stroke-width="1.5"/>
    <path d="M 424 0 L 440 0 L 440 16" fill="none" stroke="#a371f7" stroke-width="1.5"/>
    <path d="M 0 584 L 0 600 L 16 600" fill="none" stroke="#a371f7" stroke-width="1.5"/>
    <path d="M 440 584 L 440 600 L 424 600" fill="none" stroke="#a371f7" stroke-width="1.5"/>
  </g>
</svg>
