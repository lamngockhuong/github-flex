<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 680" width="920" height="680">
  <defs>
    <!-- GitHub Flex Purple gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="40%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#3d1f6d"/>
    </linearGradient>

    <!-- Subtle purple glow -->
    <radialGradient id="purpleGlow" cx="75%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8957e5;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#8957e5;stop-opacity:0"/>
    </radialGradient>

    <!-- Decorative circles -->
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a371f7;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#a371f7;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="920" height="680" fill="url(#bgGradient)"/>
  <rect width="920" height="680" fill="url(#purpleGlow)"/>

  <!-- Decorative background circles -->
  <circle cx="150" cy="550" r="200" fill="url(#circleGlow)" opacity="0.5"/>
  <circle cx="800" cy="100" r="150" fill="url(#circleGlow)" opacity="0.3"/>

  <!-- Left side: Content -->
  <g transform="translate(50, 120)">
    <!-- Logo + Name -->
    <g transform="translate(0, 0)">
      <!-- GitHub Flex Logo -->
      <g transform="translate(0, -8)">
        <rect width="44" height="44" rx="6" fill="#8957e5"/>
        <g transform="translate(10, 10) scale(0.95)" fill="#ffffff">
